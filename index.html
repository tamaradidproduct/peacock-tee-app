<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Peacock Tee">
<meta name="theme-color" content="#4a6b5a">
<title>Peacock Tee</title>
<style>
  :root {
    --bg: #f5f2ed;
    --card: #fffefb;
    --border: #e0dbd2;
    --text: #2a2520;
    --muted: #8a8178;
    --accent: #4a6b5a;
    --accent-light: #e8f0ec;
    --accent-mid: #7a9e8a;
    --done-bg: #e8f0ec;
    --done-text: #2d5a3f;
    --radius: 12px;
    --radius-sm: 8px;
    --cell-sz: 16px;
    /* chart colours */
    --ch-def-bg: #f8f9fb;
    --ch-def-border: #bcc9d8;
    --ch-def-symbol: #3d5170;
    --ch-active-bg: #eff6ff;
    --ch-active-border: #2563eb;
    --ch-active-symbol: #2563eb;
    --ch-empty-bg: #dde1e7;
    --ch-blue: #2563eb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 82px;
  }

  /* ── Header ── */
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.25rem 0.875rem;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 0.75rem; }
  .header h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.25rem; font-weight: 400; color: var(--text); letter-spacing: -0.01em;
  }
  .header h1 span { font-style: italic; color: var(--accent); }
  .header-badge {
    font-size: 11px; font-weight: 500; color: var(--accent);
    background: var(--accent-light); padding: 3px 8px; border-radius: 20px;
  }
  .progress-wrap { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .progress-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  /* ── Phase tabs ── */
  .phase-scroll { overflow-x: auto; padding: 0.875rem 1.25rem 0; display: flex; gap: 6px; scrollbar-width: none; }
  .phase-scroll::-webkit-scrollbar { display: none; }
  .phase-tab {
    white-space: nowrap; font-size: 12px; font-weight: 500; padding: 6px 13px;
    border-radius: 20px; border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .phase-tab.active { background: var(--text); color: #fff; border-color: var(--text); }
  .phase-tab.complete { background: var(--done-bg); color: var(--done-text); border-color: transparent; }
  .phase-tab .check-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--done-text); display: none; }
  .phase-tab.complete .check-dot { display: block; }

  /* ── Content ── */
  .content { padding: 1.25rem; }
  .phase-header { margin-bottom: 1rem; }
  .phase-name { font-family: Georgia, serif; font-size: 1.35rem; font-weight: 400; color: var(--text); margin-bottom: 2px; }
  .phase-desc { font-size: 12px; color: var(--muted); }

  .note {
    background: #ede9f5; border-left: 3px solid #6b5b8a;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 10px 14px; font-size: 13px; color: #6b5b8a;
    line-height: 1.55; margin-bottom: 1rem;
  }

  /* ── Steps ── */
  .steps { display: flex; flex-direction: column; gap: 2px; }
  .step {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 13px 14px;
    display: flex; align-items: flex-start; gap: 12px;
    cursor: pointer; transition: background 0.15s, border-color 0.15s;
    -webkit-user-select: none; user-select: none;
  }
  .step:active { background: var(--bg); }
  .step.done { background: var(--done-bg); border-color: transparent; }
  .step-circle {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid var(--border); background: var(--card);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    margin-top: 1px; transition: all 0.15s;
  }
  .step.done .step-circle { background: var(--accent); border-color: var(--accent); }
  .step-circle svg { display: none; }
  .step.done .step-circle svg { display: block; }
  .step-body { flex: 1; min-width: 0; }
  .step-text { font-size: 14px; line-height: 1.55; color: var(--text); }
  .step.done .step-text { color: var(--done-text); text-decoration: line-through; text-decoration-color: var(--accent-mid); }

  .row-counter {
    margin-top: 10px; background: var(--bg); border-radius: var(--radius-sm);
    padding: 10px 12px; display: flex; align-items: center; gap: 10px;
  }
  .step.done .row-counter { background: rgba(255,255,255,0.5); }
  .rc-label { flex: 1; font-size: 12px; color: var(--muted); }
  .rc-controls { display: flex; align-items: center; gap: 12px; }
  .rc-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--card);
    font-size: 18px; color: var(--text); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-weight: 300; transition: background 0.1s;
  }
  .rc-btn:active { background: var(--accent-light); }
  .rc-val { font-size: 18px; font-weight: 500; min-width: 28px; text-align: center; color: var(--text); }
  .rc-target { font-size: 12px; color: var(--muted); }
  .rc-mini-bar { width: 100%; height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .rc-mini-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  /* ── Nav buttons — fixed at bottom ── */
  .nav-btns {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; gap: 10px;
    background: var(--bg); padding: 12px 1.25rem 16px;
    border-top: 1px solid var(--border); z-index: 50;
  }
  .nav-btn {
    flex: 1; padding: 14px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--card);
    font-size: 14px; font-weight: 500; color: var(--text); cursor: pointer; transition: background 0.15s;
  }
  .nav-btn:active { background: var(--bg); }
  .nav-btn.primary { background: var(--text); color: #fff; border-color: var(--text); }
  .nav-btn.primary:active { background: #444; }

  /* ── Chart Tracker ── */
  .chart-tracker {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; margin-top: 12px;
  }

  .chart-vp {
    height: 380px;
    overflow-y: auto; overflow-x: auto;
    scrollbar-width: none;
  }
  .chart-vp::-webkit-scrollbar { display: none; }

  .chart-inner {
    display: flex; flex-direction: column;
    padding: 8px 0; width: max-content; margin: 0 auto;
  }

  .crow {
    display: flex; align-items: center;
    padding: 2px 8px 2px 12px;
    height: calc(var(--cell-sz) + 4px); flex-shrink: 0;
  }
  .crow-active { background: var(--ch-active-bg); }

  .crow-cells { display: flex; gap: 1px; }

  /* Default cell */
  .cc {
    width: var(--cell-sz); height: var(--cell-sz);
    border: 0.5px solid var(--ch-def-border);
    border-radius: 1px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    background: var(--ch-def-bg);
  }
  .cc-sym {
    font-size: 10px; line-height: 1; color: var(--ch-def-symbol);
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  /* No-stitch: stays grey even in active row */
  .cc-e { background: var(--ch-empty-bg) !important; border-color: transparent !important; }

  /* Active row overrides (all non-empty cells) */
  .crow-active .cc:not(.cc-e) {
    background: var(--ch-active-bg);
    border-color: var(--ch-active-border);
  }
  .crow-active .cc-sym { color: var(--ch-active-symbol); }

  .crow-num {
    width: 24px; flex-shrink: 0; font-size: 10px;
    color: var(--muted); text-align: right; font-weight: 500;
    padding-right: 2px; margin-left: 5px;
  }
  .crow-num-active { color: var(--ch-blue) !important; font-weight: 700; }
  .crow-num-done { color: var(--accent) !important; }

  /* Chart zoom bar */
  .chart-ctrl-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 12px 6px; border-bottom: 1px solid var(--border);
    font-size: 11px; color: var(--muted);
  }
  .zoom-btns { display: flex; gap: 5px; }
  .zoom-btn {
    height: 28px; padding: 0 10px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg);
    font-size: 12px; font-weight: 500; color: var(--text); cursor: pointer;
    display: flex; align-items: center;
  }
  .zoom-btn:active { background: var(--border); }

  /* Chart legend */
  .chart-legend {
    border-top: 1px solid var(--border);
    padding: 8px 12px 10px;
    display: flex; flex-wrap: wrap; gap: 8px 14px;
    font-size: 10px; color: var(--muted);
  }
  .leg { display: flex; align-items: center; gap: 4px; }
  .leg-cc {
    width: 14px; height: 14px;
    border: 0.5px solid var(--ch-def-border); border-radius: 1px;
    background: var(--ch-def-bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--ch-def-symbol); flex-shrink: 0;
  }
  .leg-cc-e { background: var(--ch-empty-bg); border-color: transparent; }

  /* Chart footer */
  .chart-footer {
    display: flex; align-items: center;
    border-top: 1px solid var(--border);
    padding: 14px 16px; gap: 0;
  }
  .cc-ctrl {
    width: 48px; height: 48px; border-radius: 50%; border: none;
    font-size: 28px; font-weight: 300;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: background 0.12s;
    line-height: 1;
  }
  .cc-minus { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
  .cc-minus:active { background: var(--border); }
  .cc-plus { background: var(--ch-blue); color: #fff; }
  .cc-plus:active { background: #1d4ed8; }

  .cc-stats { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 0 12px; }
  .cc-stat-lbl { font-size: 11px; color: var(--muted); letter-spacing: 0.02em; }
  .cc-cur-val { font-size: 32px; font-weight: 700; color: var(--ch-blue); line-height: 1.1; }
  .cc-total-lbl { font-size: 11px; color: var(--muted); }

  /* ── Update banner ── */
  #update-banner {
    position: fixed; bottom: 82px; left: 1.25rem; right: 1.25rem;
    background: var(--text); color: #fff;
    border-radius: var(--radius); padding: 13px 16px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 200; font-size: 14px; gap: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    animation: slide-up 0.25s ease;
  }
  @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  #update-banner button {
    background: #fff; color: var(--text); border: none;
    border-radius: 8px; padding: 7px 14px;
    font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }
</style>
  <link rel="manifest" href="/manifest.json">
</head>

<div class="header">

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>

</div>

<div class="phase-scroll" id="phase-tabs"></div>

<div class="content">

</div>

// Load extracted chart data from localStorage if available (set by extractor panel)
(function() {
  const override = localStorage.getItem('chartB_override');
  if (override) {
    try {
      const parsed = JSON.parse(override);
      if (Array.isArray(parsed) && parsed.length > 0) {
        CHART_B.splice(0, CHART_B.length, ...parsed);
      }
    } catch(e) { /* ignore bad data */ }
  }
})();

const CHART_TOTAL = CHART_B.length; // 44

// ─────────────────────────────────────────────
// PHASES

const PHASES = [

      {id:'g2', text:'Row 2 (WS): GSR, p 53 sts. Turn.'},
      {id:'g3', text:'Row 3 (RS): GSR, k 57 sts. Turn.'},
      {id:'g4', text:'Row 4 (WS): GSR, p 61 sts. Turn.'},
      {id:'g5', text:'Row 5 (RS): GSR, K3, *k2tog, k2, yo, k1, yo, k2, SSK* × 6 times, k8. Turn.'},
      {id:'g6', text:'Row 6 (WS): GSR, p 69 sts. Turn.'},
      {id:'g7', text:'Row 7 (RS): GSR, k to mid-back (34 sts). Now working in the round.'},
    ]
  },
  {
    id:'chart', name:'Yoke chart', desc:'Chart B · 4 mm needle · 44 rows',
    hasChart: true,
    steps:[
      {id:'ch1', text:'Work Chart B in the round'},
      {id:'ch2', text:'Count to confirm 253 sts', postChart: true},
    ]
  },
  {
    id:'rag', name:'Raglan', desc:'Divide & increase · 4 mm needle',
    steps:[
      {id:'r1', text:'Mark 4 sections:\n38 back / M / 1 marker-st / M / 48 sleeve / M / 1 marker-st / M / 77 front / M / 1 marker-st / M / 48 sleeve / M / 1 marker-st / M / 38 back'},
      {id:'r2', text:'Every 2nd round: m1-R before marker-st, k1 marker-st, m1-L after — at all 4 markers = 8 inc/round', rows:true, target:4, lbl:'increase rounds'},
      {id:'r3', text:'After 4 increase rounds: 285 sts total. Check mid-front measures ≈ 22 cm'},
    ]
  },
  {
    id:'body', name:'Body', desc:'4 mm circular · stockinette',
    steps:[
      {id:'b1', text:'Knit 43 (back), place 56 on hold (sleeve), CO 10, knit 87 (front), place 56 on hold (sleeve), CO 10, knit 43 (back) → 193 sts'},
      {id:'b2', text:'Stockinette in the round until side seam (from underarm) = 26 cm, or 5 cm shorter than desired length', rows:true, target:70, lbl:'rounds (≈70 for 26 cm)'},
      {id:'b3', text:'Size S only: M1 at end of last round → 194 sts'},
      {id:'b4', text:'Switch to 3 mm circular. Work k1, p1 rib for 5 cm', rows:true, target:14, lbl:'rib rounds (≈14 for 5 cm)'},
      {id:'b5', text:'Bind off in rib'},
    ]
  },
  {
    id:'slv', name:'Sleeves', desc:'4 mm DPNs · make 2',
    steps:[
      {id:'s1', text:'Sleeve 1: place 56 held sts on 4 mm DPNs. Pick up 12 sts at underarm → 68 sts. BOR = middle of picked-up sts.'},
      {id:'s2', text:'At 5 cm: k1, k2tog, k to last 2 sts, SSK (−2 sts)'},
      {id:'s3', text:'At 9 cm: decrease again → 64 sts total'},
      {id:'s4', text:'Work until sleeve = 10 cm', rows:true, target:27, lbl:'rounds (≈27 for 10 cm)'},
      {id:'s5', text:'Switch to 3 mm DPNs. Work 2 cm k1, p1 rib. Bind off in rib.', rows:true, target:5, lbl:'rib rounds'},
      {id:'s6', text:'Sleeve 2: repeat all sleeve steps'},
    ]
  },
];

const TOTAL_STEPS = PHASES.reduce((a,p) => a + p.steps.length, 0);
let cur = 0;
let state = {}, ctrs = {}, chartCurrentRow = 1, cellSz = 16;

// ─────────────────────────────────────────────
// STATE INIT
// ─────────────────────────────────────────────
PHASES.forEach(p => {
  p.steps.forEach(s => {
    state[s.id] = false;
    if (s.rows) ctrs[s.id] = 0;
  });
});

function save() {
  try {
    localStorage.setItem('pt3_state', JSON.stringify(state));
    localStorage.setItem('pt3_ctrs', JSON.stringify(ctrs));
    localStorage.setItem('pt3_cur', cur);
    localStorage.setItem('pt3_chartRow', chartCurrentRow);
    localStorage.setItem('pt3_cellSz', cellSz);
  } catch(e) {}
}

function load() {
  try {
    const st = localStorage.getItem('pt3_state'); if (st) state = Object.assign(state, JSON.parse(st));
    const ct = localStorage.getItem('pt3_ctrs'); if (ct) ctrs = Object.assign(ctrs, JSON.parse(ct));
    const cu = localStorage.getItem('pt3_cur'); if (cu !== null) cur = parseInt(cu);
    const cr = localStorage.getItem('pt3_chartRow'); if (cr !== null) chartCurrentRow = Math.max(1, Math.min(CHART_TOTAL, parseInt(cr)));
    const cs = localStorage.getItem('pt3_cellSz'); if (cs !== null) cellSz = Math.max(10, Math.min(32, parseInt(cs)));
    document.documentElement.style.setProperty('--cell-sz', cellSz + 'px');
  } catch(e) {}
}

// ─────────────────────────────────────────────
// CHART RENDERING
// ─────────────────────────────────────────────
// SVG symbols — sized to fit 15×18px cell, use currentColor so active row tint applies
// ⚑ Replace these with final SVGs from Figma when provided by Tamara
const SYMS = {
  P:  '<svg width="8" height="8" viewBox="0 0 8 8" style="display:block"><circle cx="4" cy="4" r="3.5" fill="currentColor"/></svg>',
  YO: '<svg width="9" height="9" viewBox="0 0 9 9" style="display:block"><circle cx="4.5" cy="4.5" r="3.5" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>',
  K2: '<svg width="9" height="9" viewBox="0 0 9 9" style="display:block"><polygon points="0,9 9,9 9,0" fill="currentColor"/></svg>',
  SK: '<svg width="9" height="9" viewBox="0 0 9 9" style="display:block"><polygon points="0,0 0,9 9,9" fill="currentColor"/></svg>',
  M1: '<svg width="10" height="10" viewBox="0 0 10 10" style="display:block"><circle cx="5" cy="5" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="1.5" y1="5" x2="8.5" y2="5" stroke="currentColor" stroke-width="1.5"/></svg>',
};

function stitchCell(type) {
  if (type === 'E') return '<div class="cc cc-e"></div>';
  const sym = SYMS[type] || '';
  return `<div class="cc">${sym ? `<span class="cc-sym">${sym}</span>` : ''}</div>`;
}

function buildChartTracker() {
  let html = '<div class="chart-tracker">';

  // Zoom + hint bar
  html += `<div class="chart-ctrl-bar">
    <span>Read right → left · bottom to top</span>
    <div class="zoom-btns">
      <button class="zoom-btn" onclick="resizeChart(-2)">A−</button>
      <button class="zoom-btn" onclick="resizeChart(2)">A+</button>
    </div>
  </div>`;

  // Viewport + grid
  html += '<div class="chart-vp" id="chart-vp"><div class="chart-inner" id="chart-inner">';

  // Render rows top-to-bottom visually (row 44 at top, row 1 at bottom)
  for (let r = CHART_TOTAL; r >= 1; r--) {
    const rowData = CHART_B[r - 1];
    const isActive = (r === chartCurrentRow);
    const isDone   = (r < chartCurrentRow);

    let numCls = 'crow-num';
    if (isActive) numCls += ' crow-num-active';
    else if (isDone) numCls += ' crow-num-done';

    html += `<div class="crow${isActive ? ' crow-active' : ''}" data-row="${r}">`;
    html += '<div class="crow-cells">';
    for (const t of rowData) html += stitchCell(t);
    html += '</div>';
    html += `<div class="${numCls}">${r}</div>`;
    html += '</div>';
  }

  html += '</div></div>'; // chart-inner + chart-vp

  // Legend
  html += `<div class="chart-legend">
    <div class="leg"><div class="leg-cc"></div>knit</div>
    <div class="leg"><div class="leg-cc" style="color:var(--ch-def-symbol)">${SYMS.P}</div>purl</div>
    <div class="leg"><div class="leg-cc" style="color:var(--ch-def-symbol)">${SYMS.YO}</div>yarn over</div>
    <div class="leg"><div class="leg-cc" style="color:var(--ch-def-symbol)">${SYMS.K2}</div>k2tog</div>
    <div class="leg"><div class="leg-cc" style="color:var(--ch-def-symbol)">${SYMS.SK}</div>SKPO</div>
    <div class="leg"><div class="leg-cc" style="color:var(--ch-def-symbol)">${SYMS.M1}</div>M1</div>
    <div class="leg"><div class="leg-cc leg-cc-e"></div>no stitch</div>
  </div>`;

  // Footer controls
  html += `<div class="chart-footer">
    <button class="cc-ctrl cc-minus" onclick="changeChartRow(-1)">−</button>
    <div class="cc-stats">
      <span class="cc-stat-lbl">Current row</span>
      <span class="cc-cur-val" id="cc-cur">${chartCurrentRow}</span>
      <span class="cc-total-lbl">Total rows ${CHART_TOTAL}</span>
    </div>
    <button class="cc-ctrl cc-plus" onclick="changeChartRow(1)">+</button>
  </div>`;

  html += '</div>'; // chart-tracker
  return html;
}

// ─────────────────────────────────────────────
// CHART SCROLL — centre current row in viewport
// ─────────────────────────────────────────────
function getRowH() { return cellSz + 4; } // must match .crow height in CSS (var(--cell-sz) + 4px)

function scrollChartToCurrent() {
  // On initial render, scroll so the current row is visible at the bottom half
  // (row 1 starts at the bottom; centering kicks in once the user advances past the midpoint)
  const vp = document.getElementById('chart-vp');
  const inner = document.getElementById('chart-inner');
  if (!vp || !inner) return;

  const vpH = vp.clientHeight;
  const ROW_H = getRowH();
  const visIdx = CHART_TOTAL - chartCurrentRow; // row 44 = index 0 (top), row 1 = index 43 (bottom)
  const rowTop = 8 + visIdx * ROW_H;
  const target = rowTop - vpH / 2 + ROW_H / 2;
  const maxScroll = inner.scrollHeight - vpH;

  vp.scrollTo({ top: Math.max(0, Math.min(maxScroll, target)), behavior: 'instant' });
}

function smartScrollChart(rowEl, delta) {
  // Scroll the chart viewport to keep the active row centered —
  // but only once the row reaches the viewport midpoint in the direction of travel.
  // Going up (+): track once row hits the upper half.
  // Going down (−): track once row hits the lower half.
  if (!rowEl) return;
  const vp = document.getElementById('chart-vp');
  if (!vp) return;

  const vpRect = vp.getBoundingClientRect();
  const rowRect = rowEl.getBoundingClientRect();
  const vpCenterY = vpRect.top + vpRect.height / 2;
  const rowCenterY = rowRect.top + rowRect.height / 2;

  const shouldScroll = delta > 0 ? rowCenterY <= vpCenterY : rowCenterY >= vpCenterY;
  if (shouldScroll) {
    const target = vp.scrollTop + (rowCenterY - vpCenterY);
    const maxScroll = vp.scrollHeight - vpRect.height;
    vp.scrollTo({ top: Math.max(0, Math.min(maxScroll, target)), behavior: 'smooth' });
  }
}

function resizeChart(delta) {
  cellSz = Math.max(10, Math.min(32, cellSz + delta));
  document.documentElement.style.setProperty('--cell-sz', cellSz + 'px');
  save();
  requestAnimationFrame(scrollChartToCurrent);
}

function changeChartRow(delta) {
  const prevRow = chartCurrentRow;
  chartCurrentRow = Math.max(1, Math.min(CHART_TOTAL, chartCurrentRow + delta));
  if (chartCurrentRow === prevRow) return;
  save();

  // Targeted DOM update — no full re-render
  const prevEl = document.querySelector('.crow[data-row="' + prevRow + '"]');
  if (prevEl) {
    prevEl.classList.remove('crow-active');
    const num = prevEl.querySelector('.crow-num');
    if (num) {
      num.classList.remove('crow-num-active');
      if (prevRow < chartCurrentRow) num.classList.add('crow-num-done');
      else num.classList.remove('crow-num-done');
    }
  }
  const newEl = document.querySelector('.crow[data-row="' + chartCurrentRow + '"]');
  if (newEl) {
    newEl.classList.add('crow-active');
    const num = newEl.querySelector('.crow-num');
    if (num) { num.classList.remove('crow-num-done'); num.classList.add('crow-num-active'); }
  }

  const ccur = document.getElementById('cc-cur');
  if (ccur) ccur.textContent = chartCurrentRow;
  renderStats();

  // Smart scroll: keep active row centered once it reaches the viewport midpoint
  smartScrollChart(newEl, delta);
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function doneCount()      { return Object.values(state).filter(Boolean).length; }
function phaseComplete(p) { return p.steps.every(s => state[s.id]); }

function renderTabs() {
  const el = document.getElementById('phase-tabs');
  el.innerHTML = PHASES.map((p, i) => {
    let cls = 'phase-tab';
    if (i === cur) cls += ' active';
    else if (phaseComplete(p)) cls += ' complete';
    return `<button class="${cls}" onclick="go(${i})">${phaseComplete(p) && i !== cur ? '<span class="check-dot"></span>' : ''}${p.name}</button>`;
  }).join('');
  const tabs = el.querySelectorAll('.phase-tab');
  if (tabs[cur]) tabs[cur].scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
}

function stepHtml(s) {
  const done = state[s.id];
  const ctr  = s.rows ? (ctrs[s.id] || 0) : 0;
  const pct  = s.rows ? Math.round(Math.min(100, ctr / s.target * 100)) : 0;
  return `<div class="step ${done ? 'done' : ''}" onclick="toggleStep('${s.id}')">
    <div class="step-circle">
      <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
        <path d="M1 4L4 7.5L10 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="step-body">
      <div class="step-text">${s.text.replace(/\n/g, '<br>')}</div>
      ${s.rows ? `
      <div class="row-counter" onclick="event.stopPropagation()">
        <span class="rc-label">${s.lbl}</span>
        <div class="rc-controls">
          <button class="rc-btn" onclick="changeCount('${s.id}',-1)">−</button>
          <span class="rc-val">${ctr}</span>
          <span class="rc-target">/ ${s.target}</span>
          <button class="rc-btn" onclick="changeCount('${s.id}',1)">+</button>
        </div>
      </div>
      <div class="rc-mini-bar"><div class="rc-mini-fill" style="width:${pct}%"></div></div>` : ''}
    </div>
  </div>`;
}

function renderPhase() {
  const p = PHASES[cur];
  let html = `<div class="phase-header"><div class="phase-name">${p.name}</div><div class="phase-desc">${p.desc}</div></div>`;
  if (p.note) html += `<div class="note">${p.note.replace(/\n/g, '<br>')}</div>`;

  const preSteps  = p.steps.filter(s => !s.postChart);
  const postSteps = p.steps.filter(s =>  s.postChart);

  if (preSteps.length)  html += '<div class="steps">'  + preSteps.map(stepHtml).join('') + '</div>';
  if (p.hasChart)       html += buildChartTracker();
  if (postSteps.length) html += '<div class="steps" style="margin-top:1rem">' + postSteps.map(stepHtml).join('') + '</div>';

  html += '<div class="nav-btns">';
  if (cur > 0) html += `<button class="nav-btn" onclick="go(${cur - 1})">← Back</button>`;
  if (cur < PHASES.length - 1) html += `<button class="nav-btn primary" onclick="go(${cur + 1})">Next →</button>`;
  else html += `<button class="nav-btn primary" onclick="alert('Your Peacock Tee is finished! 🎉')">Finished! 🎉</button>`;
  html += '</div>';

  document.getElementById('phase-content').innerHTML = html;
}

function renderStats() {
  const done = doneCount();
  const pct  = Math.round(done / TOTAL_STEPS * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
}

function render() {
  renderTabs();
  renderPhase();
  renderStats();
  if (PHASES[cur].hasChart) {
    requestAnimationFrame(() => requestAnimationFrame(scrollChartToCurrent));
  }
}

function go(i) {
  cur = i; save(); render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleStep(id) {
  state[id] = !state[id]; save(); render();
}

function changeCount(id, delta) {
  const step = PHASES.flatMap(p => p.steps).find(s => s.id === id);
  const max  = step ? step.target : 999;
  ctrs[id]   = Math.max(0, Math.min(max, (ctrs[id] || 0) + delta));
  save(); render();
}

// ── Service worker + update prompt ──
function showUpdateBanner(worker) {
  if (document.getElementById('update-banner')) return; // already shown
  const b = document.createElement('div');
  b.id = 'update-banner';
  b.innerHTML = '<span>Update available</span><button onclick="applyUpdate()">Update now</button>';
  document.body.appendChild(b);
  window._waitingSW = worker;
}

function applyUpdate() {
  const b = document.getElementById('update-banner');
  if (b) b.querySelector('button').textContent = 'Installing…';
  if (window._waitingSW) window._waitingSW.postMessage({ type: 'SKIP_WAITING' });
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(reg => {
    // A new SW may already be waiting (e.g. user had tab open when update deployed)
    if (reg.waiting && navigator.serviceWorker.controller) {
      showUpdateBanner(reg.waiting);
    }
    // Or it installs fresh now
    reg.addEventListener('updatefound', () => {
      const sw = reg.installing;
      sw.addEventListener('statechange', () => {
        if (sw.state === 'installed' && navigator.serviceWorker.controller) {
          showUpdateBanner(sw);
        }
      });
    });
  }).catch(() => {});

  // Once skipWaiting fires, the controller changes — reload to get fresh files
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();
  });
}
load();
render();

// Show extractor if ?extract in URL
if (location.search.includes('extract')) showExtractor();
</script>
