<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Peacock Tee">
<meta name="theme-color" content="#4a6b5a">
<title>Peacock Tee</title>
<style>
  :root {
    --bg: #f5f2ed;
    --card: #fffefb;
    --border: #e0dbd2;
    --text: #2a2520;
    --muted: #8a8178;
    --accent: #4a6b5a;
    --accent-light: #e8f0ec;
    --accent-mid: #7a9e8a;
    --done-bg: #e8f0ec;
    --done-text: #2d5a3f;
    --radius: 12px;
    --radius-sm: 8px;
    --cell-sz: 16px;
    /* chart colours */
    --ch-def-bg: #f8f9fb;
    --ch-def-border: #bcc9d8;
    --ch-def-symbol: #3d5170;
    --ch-active-bg: #eff6ff;
    --ch-active-border: #2563eb;
    --ch-active-symbol: #2563eb;
    --ch-empty-bg: #dde1e7;
    --ch-blue: #2563eb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 82px;
  }

  /* ── Chart page: lock viewport, only .chart-vp scrolls ── */
  /* Pin the header (top) and dock (bottom) with fixed positioning — the one
     layout that reliably stays within the visible area on mobile (incl. Chrome
     Custom Tabs). The scrolling middle is positioned between them via JS, so we
     don't depend on any viewport-height unit (vh/dvh/svh all misbehave here). */
  body.chart-page { height: 100svh; overflow: hidden; padding-bottom: 0; }
  body.chart-page .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 0.55rem 1.25rem 0.5rem;
    /* collapse animation only matters on the chart page (idle auto-hide) */
    max-height: 300px; overflow: hidden;
    transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.35s ease;
  }
  body.chart-page .content {
    position: fixed; left: 0; right: 0; top: 0; bottom: 0; /* top/bottom set by JS */
    overflow: hidden; padding: 0;
    display: flex; flex-direction: column;
  }
  body.chart-page #phase-content { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  body.chart-page .chart-tracker {
    flex: 1; min-height: 0; margin: 0; border: none;
    display: flex; flex-direction: column;
  }
  /* The stage holds the scrolling viewport + the floating recenter button.
     It flexes to fill whatever the panels leave behind — growing when they
     collapse, shrinking when they expand. */
  body.chart-page .chart-stage {
    flex: 1; min-height: 0; position: relative;
    display: flex; flex-direction: column;
  }
  body.chart-page .chart-vp { flex: 1; min-height: 0; height: auto; }

  /* Top/bottom panels are real layout items that collapse on idle */
  .chart-overlay-top, .chart-overlay-bottom {
    flex: 0 0 auto; background: var(--card); overflow: hidden;
  }
  .chart-overlay-top { border-bottom: 1px solid var(--border); }
  .chart-overlay-bottom { border-top: 1px solid var(--border); }

  /* Floating recenter button — anchored to the bottom-right of the chart area */
  .chart-recenter {
    display: none;
    position: absolute; right: 14px; bottom: 14px; z-index: 15;
    width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--card);
    color: var(--accent); cursor: pointer;
    align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    transition: background 0.15s, transform 0.15s;
  }
  body.chart-page .chart-recenter { display: flex; }
  .chart-recenter:active { background: var(--bg); transform: scale(0.92); }

  /* ── Header ── */
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.25rem 0.875rem;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 0.75rem; }
  .header h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.25rem; font-weight: 400; color: var(--text); letter-spacing: -0.01em;
  }
  .header h1 span { font-style: italic; color: var(--accent); }
  .header-badge {
    font-size: 11px; font-weight: 500; color: var(--accent);
    background: var(--accent-light); padding: 3px 8px; border-radius: 20px;
  }
  .progress-wrap { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .progress-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  /* Global row tally (project-wide, in the header) */
  .grow { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .grow-lbl {
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--muted); margin-right: 1px;
  }
  .grow-val {
    min-width: 24px; text-align: center;
    font-size: 15px; font-weight: 700; color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  /* ── Phase switch control + tabs ── */
  .phase-name-row { display: flex; align-items: center; gap: 8px; }
  .phase-switch-btn {
    display: flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--card);
    color: var(--muted); cursor: pointer; flex-shrink: 0; padding: 0;
    transition: background 0.15s;
  }
  .phase-switch-btn:active { background: var(--bg); }
  .phase-switch-btn .chevron { transition: transform 0.2s; }
  .phase-switch-btn.open .chevron { transform: rotate(180deg); }

  .phase-scroll {
    overflow-x: auto; margin-top: 10px; padding-bottom: 2px;
    display: flex; gap: 6px; scrollbar-width: none;
  }
  .phase-scroll.collapsed { display: none; }
  .phase-scroll::-webkit-scrollbar { display: none; }
  .phase-tab {
    white-space: nowrap; font-size: 12px; font-weight: 500; padding: 6px 13px;
    border-radius: 20px; border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .phase-tab.active { background: var(--text); color: #fff; border-color: var(--text); }
  .phase-tab.complete { background: var(--done-bg); color: var(--done-text); border-color: transparent; }
  .phase-tab .check-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--done-text); display: none; }
  .phase-tab.complete .check-dot { display: block; }

  /* ── Content ── */
  .content { padding: 1.25rem; }
  .phase-header { margin-bottom: 1rem; }
  .phase-name { font-family: Georgia, serif; font-size: 1.35rem; font-weight: 400; color: var(--text); margin-bottom: 2px; }
  .phase-desc { font-size: 12px; color: var(--muted); }
  /* Collapse animation (idle auto-hide) only applies on the chart page */
  body.chart-page .phase-header {
    margin: 0; padding: 8px 14px 7px;
    max-height: 300px; overflow: hidden;
    transition: max-height 0.35s ease, opacity 0.25s ease, margin 0.35s ease;
  }
  body.chart-page .phase-desc {
    max-height: 40px; overflow: hidden;
    transition: max-height 0.35s ease, opacity 0.25s ease;
  }

  .note {
    background: #ede9f5; border-left: 3px solid #6b5b8a;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 10px 14px; font-size: 13px; color: #6b5b8a;
    line-height: 1.55; margin-bottom: 1rem;
  }

  /* ── Steps ── */
  .steps { display: flex; flex-direction: column; gap: 2px; }
  .step {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 13px 14px;
    display: flex; align-items: flex-start; gap: 12px;
    cursor: pointer; transition: background 0.15s, border-color 0.15s;
    -webkit-user-select: none; user-select: none;
  }
  .step:active { background: var(--bg); }
  .step.done { background: var(--done-bg); border-color: transparent; }
  .step-circle {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid var(--border); background: var(--card);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    margin-top: 1px; transition: all 0.15s;
  }
  .step.done .step-circle { background: var(--accent); border-color: var(--accent); }
  .step-circle svg { display: none; }
  .step.done .step-circle svg { display: block; }
  .step-body { flex: 1; min-width: 0; }
  .step-text { font-size: 14px; line-height: 1.55; color: var(--text); }
  .step.done .step-text { color: var(--done-text); text-decoration: line-through; text-decoration-color: var(--accent-mid); }
  .step-bullets {
    list-style: none; margin: 8px 0 0; padding: 0;
    display: flex; flex-direction: column; gap: 6px;
  }
  .step-bullets li {
    position: relative; padding-left: 16px;
    font-size: 14px; line-height: 1.45; color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .step-bullets li::before {
    content: ''; position: absolute; left: 3px; top: 8px;
    width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
  }
  .step.done .step-bullets li { color: var(--done-text); }
  .step.done .step-bullets li::before { background: var(--accent-mid); }

  /* Per-round cadence reminder (e.g. increase vs plain round) */
  .round-hint {
    margin-top: 10px; padding: 9px 12px; border-radius: var(--radius-sm);
    background: var(--bg); border-left: 3px solid var(--border);
    display: flex; flex-direction: column; gap: 2px;
  }
  .round-hint-lbl {
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--muted);
  }
  .round-hint-txt { font-size: 13px; line-height: 1.45; color: var(--text); }
  .round-hint.on {
    background: var(--accent-light); border-left-color: var(--accent);
  }
  .round-hint.on .round-hint-lbl { color: var(--accent); }
  .round-hint.on .round-hint-txt { color: var(--done-text); font-weight: 500; }

  .row-counter {
    margin-top: 10px; background: var(--bg); border-radius: var(--radius-sm);
    padding: 10px 12px; display: flex; align-items: center; gap: 10px;
  }
  .step.done .row-counter { background: rgba(255,255,255,0.5); }
  .rc-label { flex: 1; font-size: 12px; color: var(--muted); }
  .rc-controls { display: flex; align-items: center; gap: 12px; }
  .rc-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--card);
    font-size: 18px; color: var(--text); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-weight: 300; transition: background 0.1s;
  }
  .rc-btn:active { background: var(--accent-light); }
  .rc-val { font-size: 18px; font-weight: 500; min-width: 28px; text-align: center; color: var(--text); }
  .rc-target { font-size: 12px; color: var(--muted); }
  .rc-mini-bar { width: 100%; height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .rc-mini-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  /* ── Nav buttons — fixed at bottom ── */
  .nav-btns {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; gap: 10px;
    background: var(--bg); padding: 12px 1.25rem 16px;
    border-top: 1px solid var(--border); z-index: 50;
  }
  .nav-btn {
    flex: 1; padding: 14px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--card);
    font-size: 14px; font-weight: 500; color: var(--text); cursor: pointer; transition: background 0.15s;
  }
  .nav-btn:active { background: var(--bg); }
  .nav-btn.primary { background: var(--text); color: #fff; border-color: var(--text); }
  .nav-btn.primary:active { background: #444; }

  /* ── Chart Tracker ── */
  .chart-tracker {
    background: var(--card);
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    overflow: hidden; margin: 12px -1.25rem 0;
  }


  .chart-vp {
    height: 380px;
    overflow-y: auto; overflow-x: auto;
    scrollbar-width: none;
  }
  .chart-vp::-webkit-scrollbar { display: none; }

  .chart-inner {
    display: flex; flex-direction: column;
    padding: 8px 0; width: max-content; margin: 0 auto;
  }

  .crow {
    display: flex; align-items: center;
    padding: 2px 8px 2px 12px;
    height: calc(var(--cell-sz) + 4px); flex-shrink: 0;
  }
  .crow-active { background: var(--ch-active-bg); }

  .crow-cells { display: flex; gap: 1px; }

  /* Default cell */
  .cc {
    width: var(--cell-sz); height: var(--cell-sz);
    border: 0.5px solid var(--ch-def-border);
    border-radius: 1px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    background: var(--ch-def-bg);
  }
  .cc-sym {
    font-size: 10px; line-height: 1; color: var(--ch-def-symbol);
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  /* No-stitch: stays grey even in active row */
  .cc-e { background: var(--ch-empty-bg) !important; border-color: transparent !important; }

  /* Active row overrides (all non-empty cells) */
  .crow-active .cc:not(.cc-e) {
    background: var(--ch-active-bg);
    border-color: var(--ch-active-border);
  }
  .crow-active .cc-sym { color: var(--ch-active-symbol); }

  .crow-num {
    width: 24px; flex-shrink: 0; font-size: 10px;
    color: var(--muted); text-align: right; font-weight: 500;
    padding-right: 2px; margin-left: 5px;
  }
  .crow-num-active { color: var(--ch-blue) !important; font-weight: 700; }
  .crow-num-done { color: var(--accent) !important; }

  /* Chart zoom bar */
  .chart-ctrl-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 12px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--muted);
    max-height: 200px; overflow: hidden;
    transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.35s ease, border-color 0.35s ease;
  }
  .zoom-btns { display: flex; gap: 5px; }
  .zoom-btn {
    height: 28px; padding: 0 10px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg);
    font-size: 12px; font-weight: 500; color: var(--text); cursor: pointer;
    display: flex; align-items: center;
  }
  .zoom-btn:active { background: var(--border); }

  /* Chart legend */
  .chart-legend {
    border-top: 1px solid var(--border);
    padding: 6px 12px 7px;
    display: flex; flex-wrap: wrap; gap: 8px 14px;
    font-size: 10px; color: var(--muted);
    max-height: 200px; overflow: hidden;
    transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.35s ease, border-color 0.35s ease;
  }

  /* Chart confirm step (merged "Count to confirm 253 sts") */
  .chart-confirm-step {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-top: 1px solid var(--border);
    cursor: pointer; -webkit-user-select: none; user-select: none;
    transition: background 0.15s, max-height 0.35s ease, opacity 0.25s ease, padding 0.35s ease, border-color 0.35s ease;
    max-height: 200px; overflow: hidden;
  }
  .chart-confirm-step:active { background: var(--bg); }
  .chart-confirm-step.done { background: var(--done-bg); }
  .chart-confirm-step.done .step-circle { background: var(--accent); border-color: var(--accent); }
  .chart-confirm-step.done .step-circle svg { display: block; }
  .chart-confirm-step.done .step-text { color: var(--done-text); text-decoration: line-through; text-decoration-color: var(--accent-mid); }

  /* ── Idle: collapse panels, leaving the minimized top bar (phase name +
        chevron) as the affordance to bring everything back ── */
  body.chart-idle .header,
  body.chart-idle .phase-desc,
  body.chart-idle .chart-ctrl-bar,
  body.chart-idle .chart-confirm-step,
  body.chart-idle .chart-dock .nav-btns {
    max-height: 0; opacity: 0;
    padding-top: 0; padding-bottom: 0; margin-top: 0; margin-bottom: 0;
    border-color: transparent;
  }

  /* ── Chart dock — row counter + nav, fixed at bottom of chart screen ── */
  .chart-dock { display: none; }
  body.chart-page .chart-dock {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    display: flex; flex-direction: column;
    background: var(--bg); border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .chart-dock .nav-btns {
    position: static;
    padding: 8px 12px 10px;
    max-height: 120px; overflow: hidden;
    transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.35s ease, border-color 0.35s ease;
  }
  .chart-dock .nav-btn { padding: 11px; }
  .leg { display: flex; align-items: center; gap: 4px; }
  .leg-cc {
    width: 14px; height: 14px;
    border: 0.5px solid var(--ch-def-border); border-radius: 1px;
    background: var(--ch-def-bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--ch-def-symbol); flex-shrink: 0;
  }
  .leg-cc-e { background: var(--ch-empty-bg); border-color: transparent; }

  /* Chart row recap — plain-language stitches for the current row */
  .chart-recap { padding: 8px 16px 9px; }
  .recap-head {
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 3px;
  }
  .recap-body {
    font-size: 14px; line-height: 1.45; color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  /* Chart footer */
  .chart-footer {
    display: flex; align-items: center;
    border-top: 1px solid var(--border);
    padding: 8px 16px; gap: 0;
  }
  .cc-ctrl {
    width: 44px; height: 44px; border-radius: 50%; border: none;
    font-size: 26px; font-weight: 300;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: background 0.12s;
    line-height: 1;
  }
  .cc-minus { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
  .cc-minus:active { background: var(--border); }
  .cc-plus { background: var(--ch-blue); color: #fff; }
  .cc-plus:active { background: #1d4ed8; }

  .cc-stats { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1px; padding: 0 12px; }
  .cc-stat-lbl { font-size: 11px; color: var(--muted); letter-spacing: 0.02em; }
  .cc-cur-val { font-size: 28px; font-weight: 700; color: var(--ch-blue); line-height: 1.1; }
  .cc-total-lbl { font-size: 11px; color: var(--muted); }

  /* ── Update banner ── */
  #update-banner {
    position: fixed; bottom: 82px; left: 1.25rem; right: 1.25rem;
    background: var(--text); color: #fff;
    border-radius: var(--radius); padding: 13px 16px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 200; font-size: 14px; gap: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    animation: slide-up 0.25s ease;
  }
  @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  #update-banner button {
    background: #fff; color: var(--text); border: none;
    border-radius: 8px; padding: 7px 14px;
    font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }
</style>

<body>

<div class="header">
  <div class="header-top">
    <h1><span>Peacock</span> Tee</h1>
    <span class="header-badge">Size S · 97 cm</span>
  </div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
    <div class="grow" title="Total rows knit across all sections">
      <span class="grow-lbl">Rows</span>
      <span class="grow-val" id="grow-val">0</span>
    </div>
    <button onclick="showExtractor()" style="font-size:10px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:4px;padding:2px 6px;cursor:pointer;flex-shrink:0;">⬡</button>
  </div>
</div>

<div class="content">
  <div id="phase-content"></div>
</div>

<div class="chart-dock" id="chart-dock"></div>

<script>
// ─────────────────────────────────────────────
// CHART B — corrected from Figma (44 rows)
// Index 0 = row 1 (worked first, displayed at bottom of chart)
// Types: K=knit  P=purl  YO=yarn over  K2=k2tog  SK=SKPO  M1=M1  E=no-stitch
// ─────────────────────────────────────────────
// Extracted directly from Figma via MCP — source of truth
// Tokens: K=knit  P=purl  YO=yarn over  K2=k2tog  SK=SKPO  M1=make one  E=no-stitch
// chartB[0]=row 1 (worked first, visual bottom)  chartB[43]=row 44 (worked last, visual top)
const CHART_B = [
  // Row 1
  ['E','E','E','E','E','E','E','K','K','K','K','K','K','K','K','K','E','E','E','E','E','E','E'],
  // Row 2
  ['E','E','E','E','E','E','E','P','P','K','K','K','K','K','P','P','E','E','E','E','E','E','E'],
  // Row 3
  ['E','E','E','E','E','E','E','K','K','K','K','K','K','K','K','K','E','E','E','E','E','E','E'],
  // Row 4

// ─────────────────────────────────────────────
// ROW RECAP — plain-language summary of the stitches in a row.
// The chart is read right → left, so we reverse the stored (left → right)
// cells, drop the no-stitch padding, run-length encode, then collapse any
// consecutive repeating block into "*…* rep N times".
// ─────────────────────────────────────────────
const STITCH_ABBR = { K: 'k', P: 'p', YO: 'yo', K2: 'k2tog', SK: 'ssk', M1: 'm1' };

function rleStitches(types) {
  const out = [];
  for (let i = 0; i < types.length; ) {
    let j = i;
    while (j < types.length && types[j] === types[i]) j++;
    const n = j - i, t = types[i];
    if (t === 'K' || t === 'P') out.push(STITCH_ABBR[t] + n);
    else out.push(n > 1 ? STITCH_ABBR[t] + ' ×' + n : STITCH_ABBR[t]);
    i = j;
  }
  return out;
}

function collapseRepeats(tokens) {
  const out = [];
  for (let i = 0; i < tokens.length; ) {
    let best = null;
    const maxLen = Math.floor((tokens.length - i) / 2);
    for (let L = 2; L <= maxLen; L++) {
      let reps = 1;
      while (i + (reps + 1) * L <= tokens.length) {
        let match = true;
        for (let k = 0; k < L; k++) {
          if (tokens[i + k] !== tokens[i + reps * L + k]) { match = false; break; }
        }
        if (!match) break;
        reps++;
      }
      if (reps >= 2 && (!best || reps * L > best.reps * best.len)) best = { len: L, reps };
    }
    if (best) {
      out.push(`*${tokens.slice(i, i + best.len).join(', ')}* rep ${best.reps} times`);
      i += best.len * best.reps;
    } else {
      out.push(tokens[i]);
      i++;
    }
  }
  return out;
}

function rowRecap(row) {
  const types = CHART_B[row - 1].filter(t => t !== 'E').reverse();
  if (!types.length) return '';
  return collapseRepeats(rleStitches(types)).join(', ');
}

function recapHtml(row) {
  return `<div class="recap-head">Repeat in the round · Row ${row}</div>
    <div class="recap-body">${rowRecap(row)}</div>`;
}

// CHART SCROLL — centre current row in viewport
// ─────────────────────────────────────────────
function getRowH() { return cellSz + 4; } // must match .crow height in CSS (var(--cell-sz) + 4px)

function scrollChartToCurrent(behavior) {
  // Centre the current row in the chart viewport. The viewport itself grows
  // and shrinks as the panels collapse/expand, so a plain centre is enough —
  // the visible area is always exactly the space left by the panels.
  const vp = document.getElementById('chart-vp');
  const inner = document.getElementById('chart-inner');
  if (!vp || !inner) return;

  const vpH = vp.clientHeight;
  const ROW_H = getRowH();
  const visIdx = CHART_TOTAL - chartCurrentRow; // row 44 = index 0 (top), row 1 = index 43 (bottom)
  const padTop = parseFloat(getComputedStyle(inner).paddingTop) || 8;
  const rowCenter = padTop + visIdx * ROW_H + ROW_H / 2;
  const target = rowCenter - vpH / 2;
  const maxScroll = inner.scrollHeight - vpH;

  vp.scrollTo({ top: Math.max(0, Math.min(maxScroll, target)), behavior: behavior || 'instant' });
}

function smartScrollChart(rowEl, delta) {
  // Keep the active row centered in the viewport once it reaches the midpoint
  // in the direction of travel.
  // Going up (+): track once row hits the upper half.
  // Going down (−): track once row hits the lower half.
  if (!rowEl) return;
  const vp = document.getElementById('chart-vp');
  if (!vp) return;

  const vpRect = vp.getBoundingClientRect();
  const rowRect = rowEl.getBoundingClientRect();
  const centerY = vpRect.top + vpRect.height / 2;
  const rowCenterY = rowRect.top + rowRect.height / 2;

  const shouldScroll = delta > 0 ? rowCenterY <= centerY : rowCenterY >= centerY;
  if (shouldScroll) {
    const target = vp.scrollTop + (rowCenterY - centerY);
    const maxScroll = vp.scrollHeight - vpRect.height;
    vp.scrollTo({ top: Math.max(0, Math.min(maxScroll, target)), behavior: 'smooth' });
  }
}

function resizeChart(delta) {
  cellSz = Math.max(10, Math.min(32, cellSz + delta));
  document.documentElement.style.setProperty('--cell-sz', cellSz + 'px');
  save();
  requestAnimationFrame(scrollChartToCurrent);
}

function changeChartRow(delta) {
  const prevRow = chartCurrentRow;
  chartCurrentRow = Math.max(1, Math.min(CHART_TOTAL, chartCurrentRow + delta));
  if (chartCurrentRow === prevRow) return;
  globalRows = Math.max(0, globalRows + (chartCurrentRow - prevRow)); // auto-advance global
  renderGlobalRows();
  save();

  // Targeted DOM update — no full re-render
  const prevEl = document.querySelector('.crow[data-row="' + prevRow + '"]');
  if (prevEl) {
    prevEl.classList.remove('crow-active');
    const num = prevEl.querySelector('.crow-num');
    if (num) {
      num.classList.remove('crow-num-active');
      if (prevRow < chartCurrentRow) num.classList.add('crow-num-done');
      else num.classList.remove('crow-num-done');
    }
  }
  const newEl = document.querySelector('.crow[data-row="' + chartCurrentRow + '"]');
  if (newEl) {
    newEl.classList.add('crow-active');
    const num = newEl.querySelector('.crow-num');
    if (num) { num.classList.remove('crow-num-done'); num.classList.add('crow-num-active'); }
  }

  const ccur = document.getElementById('cc-cur');
  if (ccur) ccur.textContent = chartCurrentRow;
  const recap = document.getElementById('chart-recap');
  if (recap) recap.innerHTML = recapHtml(chartCurrentRow);
  renderStats();

  // Smart scroll: keep active row centered once it reaches the viewport midpoint
  smartScrollChart(newEl, delta);
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function doneCount()      { return Object.values(state).filter(Boolean).length; }
function phaseComplete(p) { return p.steps.every(s => state[s.id]); }

function renderTabs() {
  const el = document.getElementById('phase-tabs');
  if (!el) return;
  el.innerHTML = PHASES.map((p, i) => {
    let cls = 'phase-tab';
    if (i === cur) cls += ' active';
    else if (phaseComplete(p)) cls += ' complete';
    return `<button class="${cls}" onclick="go(${i})">${phaseComplete(p) && i !== cur ? '<span class="check-dot"></span>' : ''}${p.name}</button>`;
  }).join('');
  el.classList.toggle('collapsed', !phaseNavOpen);

  const btn = document.getElementById('phase-switch-btn');
  if (btn) btn.classList.toggle('open', phaseNavOpen);

  if (phaseNavOpen) {
    const tabs = el.querySelectorAll('.phase-tab');
    if (tabs[cur]) tabs[cur].scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
  }
}

function togglePhaseNav() {
  phaseNavOpen = !phaseNavOpen;
  renderTabs();
}

const CHECK_SVG = `<svg width="11" height="9" viewBox="0 0 11 9" fill="none">
        <path d="M1 4L4 7.5L10 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;

// For stepped-cadence rows (e.g. "increase every 2nd round"), show what to do
// on the round the tracker says you're currently working.
function cadenceHintHtml(s, ctr, done) {
  if (!s.cadence || done || ctr >= s.target) return '';
  const round = ctr + 1;               // the round you're about to work
  const isOn  = round % s.cadence === 0;
  return `<div class="round-hint ${isOn ? 'on' : ''}">
    <span class="round-hint-lbl">Round ${round} of ${s.target}</span>
    <span class="round-hint-txt">${isOn ? s.cadenceOn : s.cadenceOff}</span>
  </div>`;
}

function stepHtml(s) {
  const done = state[s.id];
  const ctr  = s.rows ? (ctrs[s.id] || 0) : 0;
  const pct  = s.rows ? Math.round(Math.min(100, ctr / s.target * 100)) : 0;
  // Cadence steps count the round you're working (1-based: round 1..N, no
  // "round 0"); plain row counters show completed rounds.
  const rcVal = s.cadence ? Math.min(ctr + 1, s.target) : ctr;
  return `<div class="step ${done ? 'done' : ''}" onclick="toggleStep('${s.id}')">
    <div class="step-circle">${CHECK_SVG}</div>
    <div class="step-body">
      <div class="step-text">${s.text.replace(/\n/g, '<br>')}</div>
      ${s.bullets ? `<ul class="step-bullets">${s.bullets.map(b => `<li>${b}</li>`).join('')}</ul>` : ''}
      ${cadenceHintHtml(s, ctr, done)}
      ${s.rows ? `
      <div class="row-counter" onclick="event.stopPropagation()">
        <span class="rc-label">${s.lbl}</span>
        <div class="rc-controls">
          <button class="rc-btn" onclick="changeCount('${s.id}',-1)">−</button>
          <span class="rc-val">${rcVal}</span>
          <span class="rc-target">/ ${s.target}</span>
          <button class="rc-btn" onclick="changeCount('${s.id}',1)">+</button>
        </div>
      </div>
      <div class="rc-mini-bar"><div class="rc-mini-fill" style="width:${pct}%"></div></div>` : ''}
    </div>
  </div>`;
}

function renderPhase() {
  const p = PHASES[cur];
  const phaseHeaderHtml = `<div class="phase-header">
    <div class="phase-name-row">
      <div class="phase-name">${p.name}</div>
      <button class="phase-switch-btn" id="phase-switch-btn" onclick="togglePhaseNav()" aria-label="Switch section">
        <svg class="chevron" width="10" height="6" viewBox="0 0 10 6" fill="none">
          <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="phase-desc">${p.desc}</div>
    <div class="phase-scroll collapsed" id="phase-tabs"></div>
  </div>`;

  let html = '';

  if (p.hasChart) {
    const confirmStep = p.steps.find(s => s.postChart);
    html += buildChartTracker(confirmStep, phaseHeaderHtml);
  } else {
    html += phaseHeaderHtml;
    if (p.note) html += `<div class="note">${p.note.replace(/\n/g, '<br>')}</div>`;
    if (p.steps.length) html += '<div class="steps">' + p.steps.map(stepHtml).join('') + '</div>';

    html += '<div class="nav-btns">';
    if (cur > 0) html += `<button class="nav-btn" onclick="go(${cur - 1})">← Back</button>`;
    if (cur < PHASES.length - 1) html += `<button class="nav-btn primary" onclick="go(${cur + 1})">Next →</button>`;
    else html += `<button class="nav-btn primary" onclick="alert('Your Peacock Tee is finished! 🎉')">Finished! 🎉</button>`;
    html += '</div>';
  }

  document.getElementById('phase-content').innerHTML = html;
}

function renderStats() {
  const done = doneCount();
  const pct  = Math.round(done / TOTAL_STEPS * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
}

function render() {
  renderPhase();
  renderTabs();
  renderStats();

  const isChart = PHASES[cur].hasChart;
  document.body.classList.toggle('chart-page', isChart);

  if (isChart) {
    renderChartDock();
    requestAnimationFrame(() => requestAnimationFrame(syncChartLayout));
    wakeUI();
  } else {
    document.body.classList.remove('chart-idle');
    clearTimeout(uiIdleTimer);
    document.getElementById('chart-dock').innerHTML = '';
  }
}

const UI_IDLE_DELAY = 2500;
const PANEL_ANIM_MS = 420;
let uiIdleTimer = null;

// Position the scrolling middle between the fixed header and fixed dock by
// measuring their live heights, then re-centre the current row. The header and
// dock are position:fixed, so they always sit at the real top/bottom of the
// visible area — no viewport-height unit involved.
function syncChartLayout() {
  if (!document.body.classList.contains('chart-page')) return;
  const header  = document.querySelector('.header');
  const dock    = document.getElementById('chart-dock');
  const content = document.querySelector('.content');
  if (!content) return;
  content.style.top    = (header ? header.getBoundingClientRect().height : 0) + 'px';
  content.style.bottom = (dock   ? dock.getBoundingClientRect().height   : 0) + 'px';
  scrollChartToCurrent('auto');
}

// Keep the layout in sync while the panels (and thus the header/dock heights)
// animate open/closed — re-measure every frame for the duration.
function syncChartLayoutAnimated() {
  const start = performance.now();
  (function step(now) {
    syncChartLayout();
    if (now - start < PANEL_ANIM_MS) requestAnimationFrame(step);
  })(start);
}

function scheduleIdle() {
  clearTimeout(uiIdleTimer);
  uiIdleTimer = setTimeout(() => {
    document.body.classList.add('chart-idle');
    syncChartLayoutAnimated();
  }, UI_IDLE_DELAY);
}

function wakeUI() {
  const wasIdle = document.body.classList.contains('chart-idle');
  document.body.classList.remove('chart-idle');
  if (wasIdle) syncChartLayoutAnimated();
  scheduleIdle();
}

document.addEventListener('pointerdown', e => {
  if (!document.body.classList.contains('chart-page')) return;
  if (e.target.closest('.chart-vp') || e.target.closest('.chart-footer') || e.target.closest('.chart-recenter')) return;
  wakeUI();
});

function go(i) {
  cur = i; phaseNavOpen = false; save(); render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleStep(id) {
  state[id] = !state[id]; save(); render();
}

function changeCount(id, delta) {
  const step = PHASES.flatMap(p => p.steps).find(s => s.id === id);
  const max  = step ? step.target : 999;
  const prev = ctrs[id] || 0;
  ctrs[id]   = Math.max(0, Math.min(max, prev + delta));
  globalRows = Math.max(0, globalRows + (ctrs[id] - prev)); // auto-advance global by the real change
  save(); render(); renderGlobalRows();
}

// Global, project-wide row tally — read-only display that auto-advances with
// the section row counters and the chart row.
function renderGlobalRows() {
  const el = document.getElementById('grow-val');
  if (el) el.textContent = globalRows;
}

// ── Service worker + update prompt ──
function showUpdateBanner(worker) {
  if (document.getElementById('update-banner')) return; // already shown
  const b = document.createElement('div');
  b.id = 'update-banner';
  b.innerHTML = '<span>Update available</span><button onclick="applyUpdate()">Update now</button>';
  document.body.appendChild(b);
  window._waitingSW = worker;
}

function applyUpdate() {
  const b = document.getElementById('update-banner');
  if (b) b.querySelector('button').textContent = 'Installing…';
  if (window._waitingSW) window._waitingSW.postMessage({ type: 'SKIP_WAITING' });
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(reg => {
    // A new SW may already be waiting (e.g. user had tab open when update deployed)
    if (reg.waiting && navigator.serviceWorker.controller) {
      showUpdateBanner(reg.waiting);
    }
    // Or it installs fresh now
    reg.addEventListener('updatefound', () => {
      const sw = reg.installing;
      sw.addEventListener('statechange', () => {
        if (sw.state === 'installed' && navigator.serviceWorker.controller) {
          showUpdateBanner(sw);
        }
      });
    });
  }).catch(() => {});

  // Once skipWaiting fires, the controller changes — reload to get fresh files
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();
  });
}
// Re-fit the chart between the fixed bars when the viewport changes (rotation,
// toolbar show/hide, etc.).
function onViewportChange() {
  if (PHASES[cur] && PHASES[cur].hasChart) {
    requestAnimationFrame(() => requestAnimationFrame(syncChartLayout));
  }
}
window.addEventListener('resize', onViewportChange);
window.addEventListener('orientationchange', onViewportChange);
if (window.visualViewport) window.visualViewport.addEventListener('resize', onViewportChange);

load();
render();
renderGlobalRows();

// Show extractor if ?extract in URL
if (location.search.includes('extract')) showExtractor();
</script>
